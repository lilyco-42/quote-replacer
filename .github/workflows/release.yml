name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-windows
          path: target/release/quote_replacer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-macos
          path: target/release/quote_replacer

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-linux
          path: target/release/quote_replacer

  build-android:
    runs-on: ubuntu-latest
    container: ghcr.io/nickel-lang/rust-android:v0.21.0
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cargo build --release --target aarch64-linux-android
          cargo build --release --target armv7-linux-androideabi
      - name: Create lib dir
        run: |
          mkdir -p android-libs/arm64-v8a
          mkdir -p android-libs/armeabi-v7a
          cp target/aarch64-linux-android/release/libquote_replacer.so android-libs/arm64-v8a/
          cp target/armv7-linux-androideabi/release/libquote_replacer.so android-libs/armeabi-v7a/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-android
          path: android-libs

  create-release:
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        run: |
          tag=${GITHUB_REF#refs/tags/}
          gh release create "$tag" --title "Quote Replacer $tag" --notes "Multi-platform release (Windows/macOS/Linux/Android)"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload artifacts
        run: |
          tag=${GITHUB_REF#refs/tags/}
          for f in artifacts/*/*; do
            gh release upload "$tag" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ github.token }}