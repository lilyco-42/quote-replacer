name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-windows
          path: target/release/quote_replacer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-macos
          path: target/release/quote_replacer

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-linux
          path: target/release/quote_replacer

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd /tmp
          for i in 1 2 3; do
            curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip && break
            sleep 5
          done
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        env:
          ANDROID_HOME: /opt/android-sdk
      - name: Accept licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a60b5efb7e6bef27410e80caf2" > $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c46" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af8d351e6a49bc87" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "601085b94cd77f0b54ff86406957070ebe2f51e9" >> $ANDROID_HOME/licenses/android-sdk-license
      - name: Install SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "ndk;26.1.10909112"
        env:
          ANDROID_HOME: /opt/android-sdk
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi
      - name: Build
        env:
          ANDROID_NDK_HOME: /opt/android-sdk/ndk/26.1.10909112
        run: |
          cargo build --release --target aarch64-linux-android
          cargo build --release --target armv7-linux-androideabi
      - name: Create libs
        run: |
          mkdir -p android-libs/arm64-v8a
          mkdir -p android-libs/armeabi-v7a
          cp target/aarch64-linux-android/release/libquote_replacer.so android-libs/arm64-v8a/
          cp target/armv7-linux-androideabi/release/libquote_replacer.so android-libs/armeabi-v7a/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-android
          path: android-libs

  create-release:
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        run: |
          tag=${GITHUB_REF#refs/tags/}
          gh release create "$tag" --title "Quote Replacer $tag" --notes "Multi-platform release with Android support"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload artifacts
        run: |
          tag=${GITHUB_REF#refs/tags/}
          for f in artifacts/*/*; do
            gh release upload "$tag" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ github.token }}