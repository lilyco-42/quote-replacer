name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-windows
          path: target/release/quote_replacer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-macos
          path: target/release/quote_replacer

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Build
        run: cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-linux
          path: target/release/quote_replacer

  build-android:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nickel-lang/rust-android:v0.21.0
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-apk
        run: cargo install cargo-apk
      - name: Build APK
        run: cargo apk build --release
      - name: Rename APK
        run: |
          mv target/release/apk/quote_replacer/release/quote_replacer-1.0.0-release.apk quote-replacer.apk
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quote-replacer-android
          path: quote-replacer.apk

  create-release:
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        run: |
          tag=${GITHUB_REF#refs/tags/}
          gh release create $tag --title "Quote Replacer $tag" --notes "Multi-platform release (Windows/macOS/Linux/Android)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        run: |
          tag=${GITHUB_REF#refs/tags/}
          for f in artifacts/*/*; do
            gh release upload "$tag" "$f" --clobber
          done